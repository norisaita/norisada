<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Action Game - Moving Wall Mission</title>
<style>
    body { margin: 0; overflow:hidden; background:#222; font-family: sans-serif; }
    canvas { background: #87CEEB; display: block; }
    #ui { position: fixed; top: 10px; left: 10px; color: white; font-size: 20px; text-shadow: 1px 1px 2px black; }
    #message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 40px; text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; display: none; }
    button { font-size: 20px; padding: 10px 20px; margin-top: 15px; cursor: pointer; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">Time: <span id="time">0.0</span></div>
<div id="message"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const gravity = 0.6;
let keys = {};
let startTime = Date.now();
let gameOver = false;
let clear = false;
let cameraX = 0;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

class Player {
    constructor() {
        this.x = 100;
        this.y = 300;
        this.w = 40;
        this.h = 40;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
    }

    update() {
        if (gameOver || clear) return;

        // 左右移動
        if (keys["ArrowLeft"]) this.vx = -5;
        else if (keys["ArrowRight"]) this.vx = 5;
        else this.vx = 0;

        // ジャンプ（上キー）
        if (keys["ArrowUp"] && this.onGround) {
            this.vy = -12;
            this.onGround = false;
        }

        let touchingWall = false;
        let wallObject = null;

        // X軸移動と壁判定
        this.x += this.vx;
        [...platforms, ...movingWalls].forEach(p => {
            if (this.rectIntersect(this, p)) {
                if (this.vx > 0) this.x = p.x - this.w;
                if (this.vx < 0) this.x = p.x + p.w;
                touchingWall = true;
                wallObject = p;
            }
        });

        // Y軸移動と床判定
        this.y += this.vy;
        this.onGround = false;
        [...platforms, ...movingWalls].forEach(p => {
            if (this.rectIntersect(this, p)) {
                if (this.vy > 0 && this.y + this.h - this.vy <= p.y + (p.vy || 0)) {
                    this.y = p.y - this.h;
                    this.vy = p.vy || 0; // 動く床に対応
                    this.onGround = true;
                } else if (this.vy < 0) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                }
            }
        });

        // 壁登りシステム (Space + Up/Down)
        if (touchingWall && keys[" "]) {
            this.vy = 0;
            if (keys["ArrowUp"]) this.vy = -5;
            else if (keys["ArrowDown"]) this.vy = 5;
            // 壁が動いている場合、その速度を同期させる
            if (wallObject && wallObject.vy) this.y += wallObject.vy;
        } else {
            this.vy += gravity;
        }

        // 判定
        spikes.forEach(s => { if (this.rectIntersect(this, s)) die(); });
        springs.forEach(s => { if (this.rectIntersect(this, s)) this.vy = -18; });
        if (this.rectIntersect(this, goal)) win();
        if (this.y > canvas.height + 100) die();
    }

    rectIntersect(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
    }

    draw() {
        ctx.fillStyle = (keys[" "] && !this.onGround) ? "#FFA500" : "#FF4444";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

// --- オブジェクト ---
class Platform {
    constructor(x, y, w, h) { Object.assign(this, {x, y, w, h}); }
    draw() {
        ctx.fillStyle = "#5D4037";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

class MovingWall {
    constructor(x, y, w, h, range, speed) {
        Object.assign(this, {x, y, w, h, range, speed, startY: y, vy: 0});
    }
    update() {
        let oldY = this.y;
        this.y = this.startY + Math.sin(Date.now() * 0.001 * this.speed) * this.range;
        this.vy = this.y - oldY;
    }
    draw() {
        ctx.fillStyle = "#78909C";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        // 張り付きポイントのガイドライン
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.strokeRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

class Spike {
    constructor(x, y) { Object.assign(this, {x, y, w: 40, h: 20}); }
    draw() {
        ctx.fillStyle = "#FF0000";
        ctx.beginPath();
        ctx.moveTo(this.x - cameraX, this.y + this.h);
        ctx.lineTo(this.x + this.w/2 - cameraX, this.y);
        ctx.lineTo(this.x + this.w - cameraX, this.y + this.h);
        ctx.fill();
    }
}

class Spring {
    constructor(x, y) { Object.assign(this, {x, y, w: 40, h: 15}); }
    draw() {
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

class Goal {
    constructor(x, y) { Object.assign(this, {x, y, w: 60, h: 80}); }
    draw() {
        ctx.fillStyle = "#00FF00";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        ctx.fillStyle = "white";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("GOAL", this.x - cameraX + 2, this.y - 10);
    }
}

// --- ステージ生成 ---
let player = new Player();
let platforms = [];
let movingWalls = [];
let spikes = [];
let springs = [];
let goal = new Goal(0, 0);

function createStage() {
    // スタート地点
    platforms.push(new Platform(0, 500, 500, 200));

    // 中盤：アスレチックセクション
    platforms.push(new Platform(650, 400, 150, 20));
    spikes.push(new Spike(700, 380));
    
    platforms.push(new Platform(950, 300, 200, 20));
    springs.push(new Spring(1030, 285));

    platforms.push(new Platform(1300, 200, 300, 20));
    spikes.push(new Spike(1400, 180));
    spikes.push(new Spike(1440, 180));

    platforms.push(new Platform(1750, 400, 200, 20));

    // 終盤：動く壁ギミックセクション（地面がない！）
    platforms.push(new Platform(2100, 450, 200, 50)); // ギミック前の足場
    
    // 上下に動く壁 (x, y, w, h, 振幅, スピード)
    movingWalls.push(new MovingWall(2500, 300, 60, 250, 150, 2));

    // ゴール地点の島
    platforms.push(new Platform(2800, 250, 300, 500));
    goal = new Goal(2900, 170);
}

createStage();

function die() {
    if(gameOver || clear) return;
    gameOver = true;
    const m = document.getElementById("message");
    m.innerHTML = "GAME OVER<br><button onclick='location.reload()'>Retry</button>";
    m.style.display = "block";
}

function win() {
    if(clear || gameOver) return;
    clear = true;
    let time = (Date.now() - startTime) / 1000;
    const m = document.getElementById("message");
    m.innerHTML = "CLEAR!<br>Time: " + time.toFixed(2) + "s<br><button onclick='location.reload()'>Restart</button>";
    m.style.display = "block";
}

function loop() {
    cameraX = player.x - 200;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    movingWalls.forEach(mw => mw.update());
    player.update();

    platforms.forEach(p => p.draw());
    movingWalls.forEach(mw => mw.draw());
    spikes.forEach(s => s.draw());
    springs.forEach(s => s.draw());
    goal.draw();
    player.draw();

    if (!gameOver && !clear) {
        let time = (Date.now() - startTime) / 1000;
        document.getElementById("time").textContent = time.toFixed(1);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
