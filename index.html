<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Action Game - Wall Climb Edition</title>
<style>
    body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
    canvas { background: #87CEEB; display: block; }
    #ui { position: fixed; top: 10px; left: 10px; color: white; font-size: 20px; text-shadow: 1px 1px 2px black; }
    #message { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 40px; text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; display: none; z-index: 10; }
    button { font-size: 20px; padding: 10px 20px; margin-top: 15px; cursor: pointer; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">Time: <span id="time">0.0</span></div>
<div id="message"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const gravity = 0.6;
let keys = {};
let startTime = Date.now();
let gameOver = false;
let clear = false;
let cameraX = 0;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

class Player {
    constructor() {
        this.x = 100;
        this.y = 300;
        this.w = 40;
        this.h = 40;
        this.vx = 0;
        this.vy = 0;
        this.onGround = false;
        this.isClinging = false; // 壁に張り付いているか
    }

    update() {
        if (gameOver || clear) return;

        // 左右移動
        if (keys["ArrowLeft"]) this.vx = -5;
        else if (keys["ArrowRight"]) this.vx = 5;
        else this.vx = 0;

        // ジャンプ（上キー）
        if (keys["ArrowUp"] && this.onGround) {
            this.vy = -12;
            this.onGround = false;
        }

        // 重力計算（スペースキーで張り付いている間は重力を無視して登れる）
        let touchingWall = false;

        // 当たり判定
        this.onGround = false;
        this.x += this.vx;
        
        platforms.forEach(p => {
            if (this.rectIntersect(this, p)) {
                if (this.vx > 0) this.x = p.x - this.w;
                if (this.vx < 0) this.x = p.x + p.w;
                touchingWall = true;
            }
        });

        this.y += this.vy;
        platforms.forEach(p => {
            if (this.rectIntersect(this, p)) {
                if (this.vy > 0) {
                    this.y = p.y - this.h;
                    this.vy = 0;
                    this.onGround = true;
                } else if (this.vy < 0) {
                    this.y = p.y + p.h;
                    this.vy = 0;
                }
            }
        });

        // 壁登りシステム：壁に接していてスペースキーを押している間
        if (touchingWall && keys[" "]) {
            this.vy = 0; 
            if (keys["ArrowUp"]) this.vy = -5; // 上で登る
            else if (keys["ArrowDown"]) this.vy = 5; // 下で降りる
        } else {
            this.vy += gravity;
        }

        // ギミック判定
        springs.forEach(s => { if (this.rectIntersect(this, s)) this.vy = -18; });
        spikes.forEach(s => { if (this.rectIntersect(this, s)) die(); });
        if (this.rectIntersect(this, goal)) win();
        if (this.y > canvas.height + 200) die();
    }

    rectIntersect(r1, r2) {
        return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
    }

    draw() {
        ctx.fillStyle = keys[" "] && !this.onGround ? "#FFA500" : "#FF4444"; // 張り付き中はオレンジに
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

// --- オブジェクトクラス ---
class Platform {
    constructor(x, y, w, h) { Object.assign(this, {x, y, w, h}); }
    draw() {
        ctx.fillStyle = "#5D4037";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

class Spike {
    constructor(x, y) { Object.assign(this, {x, y, w: 40, h: 20}); }
    draw() {
        ctx.fillStyle = "#FF0000";
        ctx.beginPath();
        ctx.moveTo(this.x - cameraX, this.y + this.h);
        ctx.lineTo(this.x + this.w/2 - cameraX, this.y);
        ctx.lineTo(this.x + this.w - cameraX, this.y + this.h);
        ctx.fill();
    }
}

class Spring {
    constructor(x, y) { Object.assign(this, {x, y, w: 40, h: 15}); }
    draw() {
        ctx.fillStyle = "#FFD700";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

class Goal {
    constructor(x, y) { Object.assign(this, {x, y, w: 60, h: 60}); }
    draw() {
        ctx.fillStyle = "#00FF00";
        ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
    }
}

// --- ステージ構築 ---
let player = new Player();
let platforms = [];
let spikes = [];
let springs = [];
let goal = new Goal(2500, 300);

function createStage() {
    // 1. 安全な初期地点
    platforms.push(new Platform(0, 500, 600, 100));

    // 2. 固定の地形配置
    platforms.push(new Platform(700, 400, 100, 200)); // 壁登り用の高い壁
    platforms.push(new Platform(900, 300, 100, 300));
    platforms.push(new Platform(1200, 450, 400, 50)); 
    platforms.push(new Platform(1700, 200, 50, 400)); // 細い高い壁

    // 3. トゲ (触れると死ぬ)
    spikes.push(new Spike(1250, 430));
    spikes.push(new Spike(1350, 430));
    spikes.push(new Spike(1450, 430));

    // 4. ジャンプ台
    springs.push(new Spring(500, 485));
    springs.push(new Spring(1100, 550));

    // ゴール
    goal = new Goal(2000, 400);
}

createStage();

function die() {
    if(gameOver || clear) return;
    gameOver = true;
    document.getElementById("message").innerHTML = "GAME OVER<br><button onclick='location.reload()'>Retry</button>";
    document.getElementById("message").style.display = "block";
}

function win() {
    if(clear || gameOver) return;
    clear = true;
    let time = (Date.now() - startTime) / 1000;
    document.getElementById("message").innerHTML = "CLEAR!<br>Time: " + time.toFixed(2) + "s<br><button onclick='location.reload()'>Retry</button>";
    document.getElementById("message").style.display = "block";
}

function loop() {
    cameraX = player.x - 200;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    player.update();

    platforms.forEach(p => p.draw());
    spikes.forEach(s => s.draw());
    springs.forEach(s => s.draw());
    goal.draw();
    player.draw();

    if (!gameOver && !clear) {
        let time = (Date.now() - startTime) / 1000;
        document.getElementById("time").textContent = time.toFixed(1);
    }
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
