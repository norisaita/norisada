<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スクロール壁登りアクション</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
}
canvas {
    display: block;
    margin: auto;
    background: #1a1a2e;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.8;
const jumpPower = -15;

let player, velocityY, onGround, wallStick;
let clear, gameOver;
let startTime, clearTime;

const worldWidth = 4000;

const platforms = [
    {x:0,y:540,w:4000,h:60},
    {x:350,y:450,w:200,h:20},
    {x:750,y:400,w:200,h:20}
];

const walls = [
    {x:300,y:440,w:50,h:100},
    {x:700,y:390,w:50,h:150}
];

let goal;

function resetGame(){
    player = {x:100,y:500,w:40,h:40};
    velocityY = 0;
    onGround = false;
    wallStick = false;
    clear = false;
    gameOver = false;
    startTime = Date.now();
    clearTime = 0;
    goal = {x:100 + player.w * 30, y:350, w:60, h:60};
}
resetGame();

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function rectCollision(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

function update(){

    if(!clear && !gameOver){

        if(keys["ArrowLeft"]) player.x -= 5;
        if(keys["ArrowRight"]) player.x += 5;

        if(keys["ArrowUp"] && onGround){
            velocityY = jumpPower;
            onGround = false;
        }

        if(!wallStick) velocityY += gravity;

        player.y += velocityY;

        onGround = false;
        platforms.forEach(p=>{
            if(rectCollision(player,p) && velocityY >= 0){
                player.y = p.y - player.h;
                velocityY = 0;
                onGround = true;
            }
        });

        wallStick = false;
        walls.forEach(w=>{
            if(rectCollision(player,w) && keys[" "]){
                if(keys["ArrowDown"]) return;
                wallStick = true;
                velocityY = 0;
                if(keys["ArrowUp"]) player.y -= 5;
            }
        });

        if(rectCollision(player,goal)){
            clear = true;
            clearTime = ((Date.now() - startTime)/1000).toFixed(2);
        }

        if(player.y > 700){
            gameOver = true;
        }
    }

    if(keys["r"] || keys["R"]) resetGame();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const cameraX = player.x - 200;

    // プレイヤー
    ctx.fillStyle = "#00c8ff";
    ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);

    // 足場
    ctx.fillStyle = "#aaa";
    platforms.forEach(p=>{
        ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
    });

    // 壁
    ctx.fillStyle = "#c33";
    walls.forEach(w=>{
        ctx.fillRect(w.x - cameraX, w.y, w.w, w.h);
    });

    // 王冠ゴール
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.moveTo(goal.x - cameraX, goal.y + 60);
    ctx.lineTo(goal.x - cameraX + 15, goal.y + 20);
    ctx.lineTo(goal.x - cameraX + 30, goal.y + 60);
    ctx.lineTo(goal.x - cameraX + 45, goal.y + 20);
    ctx.lineTo(goal.x - cameraX + 60, goal.y + 60);
    ctx.closePath();
    ctx.fill();

    // タイマー
    if(!clear && !gameOver){
        ctx.fillStyle="white";
        ctx.font="20px Arial";
        const t = ((Date.now()-startTime)/1000).toFixed(2);
        ctx.fillText("Time: "+t+"s",20,30);
    }

    if(clear){
        ctx.fillStyle="yellow";
        ctx.font="50px Arial";
        ctx.fillText("CLEAR!",300,250);
        ctx.font="30px Arial";
        ctx.fillText("Clear Time: "+clearTime+"s",300,300);
        ctx.fillText("Press R to Restart",280,350);
    }

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="50px Arial";
        ctx.fillText("GAME OVER",260,250);
        ctx.font="30px Arial";
        ctx.fillText("Press R to Retry",300,320);
    }
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
