<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Platform Action</title>
<style>
body{margin:0;overflow:hidden;background:skyblue;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=1000;
canvas.height=500;

const GRAVITY=0.6
const PLAYER=30
const GROUND=420

let cameraX=0
let startTime
let clearTime=0
let gameState="playing"

let player
let keys={}

function init(){

player={
x:100,
y:200,
w:PLAYER,
h:PLAYER,
vx:0,
vy:0,
speed:5,
jump:-12,
onGround:false,
onWall:false
}

cameraX=0
startTime=Date.now()
gameState="playing"

}

init()

document.addEventListener("keydown",e=>{

keys[e.code]=true

if(gameState!="playing" && e.code=="KeyR"){
init()
}

})

document.addEventListener("keyup",e=>{
keys[e.code]=false
})

function hit(a,b){

return a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y

}

let pits=[
{x:500,w:200},
{x:900,w:300},
{x:1400,w:250},
{x:1800,w:300},
{x:2300,w:250},
{x:2700,w:350},
{x:3200,w:300}
]

let platforms=[

{x:550,y:300,w:120,h:20},
{x:720,y:260,w:120,h:20},

{x:950,y:280,w:120,h:20},
{x:1100,y:240,w:120,h:20},
{x:1250,y:200,w:120,h:20},

{x:1500,y:300,w:120,h:20},
{x:1650,y:260,w:120,h:20},

{x:1850,y:280,w:120,h:20},
{x:2000,y:240,w:120,h:20},

{x:2400,y:280,w:120,h:20},
{x:2550,y:240,w:120,h:20},

{x:3000,y:260,w:120,h:20},
{x:3150,y:220,w:120,h:20}

]

let walls=[

{x:1700,y:200,w:40,h:220},
{x:2600,y:200,w:40,h:220}

]

let movingWalls=[

{x:2100,y:300,w:120,h:20,min:200,max:350,dir:1,speed:2},

{x:3400,y:300,w:120,h:20,min:150,max:350,dir:1,speed:2}

]

let jumpPads=[

{x:1350,y:390,w:40,h:30},
{x:2850,y:390,w:40,h:30}

]

let goal={x:3800,y:350,w:40,h:40}

function update(){

if(gameState!="playing")return

for(let w of movingWalls){

w.y+=w.speed*w.dir

if(w.y<w.min || w.y>w.max){

w.dir*=-1

}

}

let prevX=player.x
let prevY=player.y

player.vx=0

if(keys["ArrowLeft"])player.vx=-player.speed
if(keys["ArrowRight"])player.vx=player.speed

if(keys["ArrowUp"] && player.onGround){

player.vy=player.jump
player.onGround=false

}

player.vy+=GRAVITY

player.x+=player.vx
player.y+=player.vy

player.onGround=false
player.onWall=false

let inPit=false

for(let p of pits){

if(player.x+player.w>p.x && player.x<p.x+p.w){
inPit=true
}

}

if(!inPit && player.y+player.h>=GROUND){

player.y=GROUND-player.h
player.vy=0
player.onGround=true

}

for(let p of platforms){

if(player.x+player.w>p.x &&
player.x<p.x+p.w &&
prevY+player.h<=p.y &&
player.y+player.h>=p.y){

player.y=p.y-player.h
player.vy=0
player.onGround=true

}

}

let allWalls=[...walls,...movingWalls]

for(let w of allWalls){

if(hit(player,w)){

if(prevY+player.h<=w.y){

player.y=w.y-player.h
player.vy=0
player.onGround=true

if(movingWalls.includes(w)){
player.y+=w.speed*w.dir
}

continue

}

if(prevX+player.w<=w.x){

player.x=w.x-player.w
player.onWall=true

}

else if(prevX>=w.x+w.w){

player.x=w.x+w.w
player.onWall=true

}

}

}

if(player.onWall && keys["Space"]){

player.vy=-4

}

for(let j of jumpPads){

if(player.x+player.w>j.x &&
player.x<j.x+j.w &&
player.y+player.h>j.y &&
player.y+player.h<j.y+20 &&
player.vy>=0){

player.vy=-18

}

}

if(player.y>canvas.height){

gameState="over"

}

if(hit(player,goal)){

gameState="clear"

clearTime=((Date.now()-startTime)/1000).toFixed(2)

}

cameraX=player.x-200

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.save()

ctx.translate(-cameraX,0)

ctx.fillStyle="green"

for(let x=0;x<4000;x+=100){

let hole=false

for(let p of pits){

if(x>=p.x && x<p.x+p.w)hole=true

}

if(!hole){

ctx.fillRect(x,GROUND,100,200)

}

}

ctx.fillStyle="brown"

for(let p of platforms){

ctx.fillRect(p.x,p.y,p.w,p.h)

}

ctx.fillStyle="gray"

for(let w of walls){

ctx.fillRect(w.x,w.y,w.w,w.h)

}

ctx.fillStyle="darkgray"

for(let w of movingWalls){

ctx.fillRect(w.x,w.y,w.w,w.h)

}

ctx.fillStyle="purple"

for(let j of jumpPads){

ctx.fillRect(j.x,j.y,j.w,j.h)

}

ctx.fillStyle="gold"

ctx.fillRect(goal.x,goal.y,goal.w,goal.h)

ctx.fillStyle="red"

ctx.fillRect(player.x,player.y,player.w,player.h)

ctx.restore()

ctx.fillStyle="black"

ctx.font="20px Arial"

let t=((Date.now()-startTime)/1000).toFixed(2)

ctx.fillText("Time: "+t,20,30)

if(gameState=="over"){

ctx.font="50px Arial"
ctx.fillStyle="red"
ctx.fillText("GAME OVER",350,200)

ctx.font="20px Arial"
ctx.fillText("Press R to Retry",420,240)

}

if(gameState=="clear"){

ctx.font="50px Arial"
ctx.fillStyle="blue"
ctx.fillText("CLEAR!",380,200)

ctx.font="30px Arial"
ctx.fillText("Time: "+clearTime+"s",400,240)

ctx.font="20px Arial"
ctx.fillText("Press R to Retry",400,280)

}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
