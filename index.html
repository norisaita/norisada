<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高難易度スクロール壁登りアクション</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; margin:auto; background:#141428; }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.8;
const jumpPower = -15;

let player, velocityY, onGround, wallStick;
let clear, gameOver;
let startTime, clearTime;

function resetGame(){
    player = {x:100,y:500,w:40,h:40};
    velocityY = 0;
    onGround = false;
    wallStick = false;
    clear = false;
    gameOver = false;
    startTime = Date.now();
    clearTime = 0;
}
resetGame();

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function rectCollision(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

/* =======================
   🔥 高難易度ステージ
======================= */

const platforms = [
    // 地面（穴あり）
    {x:0,y:540,w:600,h:60},
    {x:700,y:540,w:600,h:60},
    {x:1400,y:540,w:600,h:60},
    {x:2100,y:540,w:600,h:60},
    {x:2800,y:540,w:600,h:60},
    {x:3500,y:540,w:600,h:60},

    // 上昇足場ゾーン
    {x:400,y:450,w:200,h:20},
    {x:900,y:400,w:200,h:20},
    {x:1600,y:350,w:200,h:20},
    {x:2300,y:300,w:200,h:20},
    {x:3000,y:350,w:200,h:20},
    {x:3700,y:300,w:200,h:20},

    // 終盤高難度足場
    {x:4300,y:260,w:150,h:20},
    {x:4600,y:220,w:150,h:20}
];

const walls = [
    {x:350,y:440,w:50,h:120},
    {x:850,y:390,w:50,h:120},
    {x:1550,y:340,w:50,h:120},
    {x:2250,y:290,w:50,h:120},
    {x:2950,y:340,w:50,h:120},
    {x:3650,y:290,w:50,h:120},
    {x:4250,y:240,w:50,h:120},
    {x:4550,y:200,w:50,h:120}
];

// 落とし穴ゾーン（可視化用）
const pits = [
    {x:600,y:540,w:100,h:60},
    {x:1300,y:540,w:100,h:60},
    {x:2000,y:540,w:100,h:60},
    {x:2700,y:540,w:100,h:60},
    {x:3400,y:540,w:100,h:60}
];

const goal = {x:5000,y:180,w:60,h:60};

function update(){

    if(!clear && !gameOver){

        if(keys["ArrowLeft"]) player.x -= 5;
        if(keys["ArrowRight"]) player.x += 5;

        if(keys["ArrowUp"] && onGround){
            velocityY = jumpPower;
            onGround = false;
        }

        if(!wallStick) velocityY += gravity;
        player.y += velocityY;

        onGround = false;
        platforms.forEach(p=>{
            if(rectCollision(player,p) && velocityY >= 0){
                player.y = p.y - player.h;
                velocityY = 0;
                onGround = true;
            }
        });

        wallStick = false;
        walls.forEach(w=>{
            if(rectCollision(player,w) && keys[" "]){
                if(keys["ArrowDown"]) return;
                wallStick = true;
                velocityY = 0;
                if(keys["ArrowUp"]) player.y -= 5;
            }
        });

        if(rectCollision(player,goal)){
            clear = true;
            clearTime = ((Date.now()-startTime)/1000).toFixed(2);
        }

        // 落下死亡
        if(player.y > 700){
            gameOver = true;
        }
    }

    if(keys["r"] || keys["R"]) resetGame();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    const cameraX = player.x - 200;

    // プレイヤー
    ctx.fillStyle="#00c8ff";
    ctx.fillRect(player.x-cameraX,player.y,player.w,player.h);

    // 足場
    ctx.fillStyle="#aaa";
    platforms.forEach(p=>{
        ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
    });

    // 壁
    ctx.fillStyle="#c33";
    walls.forEach(w=>{
        ctx.fillRect(w.x-cameraX,w.y,w.w,w.h);
    });

    // 落とし穴（黒）
    ctx.fillStyle="#000";
    pits.forEach(p=>{
        ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
    });

    // 王冠
    ctx.fillStyle="gold";
    ctx.beginPath();
    ctx.moveTo(goal.x-cameraX,goal.y+60);
    ctx.lineTo(goal.x-cameraX+15,goal.y+20);
    ctx.lineTo(goal.x-cameraX+30,goal.y+60);
    ctx.lineTo(goal.x-cameraX+45,goal.y+20);
    ctx.lineTo(goal.x-cameraX+60,goal.y+60);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle="white";
    ctx.font="20px Arial";

    if(!clear && !gameOver){
        const t=((Date.now()-startTime)/1000).toFixed(2);
        ctx.fillText("Time: "+t+"s",20,30);
    }

    if(clear){
        ctx.fillStyle="yellow";
        ctx.font="50px Arial";
        ctx.fillText("CLEAR!",300,250);
        ctx.font="30px Arial";
        ctx.fillText("Clear Time: "+clearTime+"s",300,300);
    }

    if(gameOver){
        ctx.fillStyle="red";
        ctx.font="50px Arial";
        ctx.fillText("GAME OVER",260,250);
        ctx.font="30px Arial";
        ctx.fillText("Press R to Retry",300,320);
    }
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
