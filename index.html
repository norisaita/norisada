<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Action Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
}

canvas{
background:#87CEEB;
display:block;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:20px;
}

#message{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
text-align:center;
}

button{
font-size:20px;
padding:10px 20px;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
Time: <span id="time">0.0</span>
</div>

<div id="message"></div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let gravity = 0.6
let keys={}
let startTime=Date.now()

let gameOver=false
let clear=false

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

class Player{

constructor(){
this.x=100
this.y=300
this.w=40
this.h=40
this.vx=0
this.vy=0
this.onGround=false
this.wall=false
}

update(){

if(gameOver || clear) return

if(keys["ArrowLeft"]) this.vx=-5
else if(keys["ArrowRight"]) this.vx=5
else this.vx=0

if(keys[" "] && this.onGround){
this.vy=-12
}

if(this.wall && keys["ArrowUp"]){
this.vy=-6
}

if(this.wall && keys["ArrowDown"]){
this.wall=false
}

this.vy+=gravity

this.x+=this.vx
this.y+=this.vy

this.onGround=false
this.wall=false

platforms.forEach(p=>{

if(this.x < p.x+p.w &&
this.x+this.w > p.x &&
this.y < p.y+p.h &&
this.y+this.h > p.y){

if(this.vy>0 && this.y+this.h-this.vy<=p.y){
this.y=p.y-this.h
this.vy=0
this.onGround=true
}

else if(this.vy<0 && this.y>=p.y+p.h){
this.y=p.y+p.h
this.vy=0
}

else{

if(this.x+this.w-this.vx<=p.x){
this.x=p.x-this.w
this.wall=true
}

else if(this.x-this.vx>=p.x+p.w){
this.x=p.x+p.w
this.wall=true
}

}

}

})

springs.forEach(s=>{

if(this.x < s.x+s.w &&
this.x+this.w > s.x &&
this.y < s.y+s.h &&
this.y+this.h > s.y){

this.vy=-18

}

})

movingWalls.forEach(m=>{

m.update()

if(this.x < m.x+m.w &&
this.x+this.w > m.x &&
this.y < m.y+m.h &&
this.y+this.h > m.y){

if(this.vy>0){
this.y=m.y-this.h
this.vy=0
this.onGround=true
}

}

})

if(this.y>canvas.height+500){
die()
}

if(this.x>goal.x && this.x<goal.x+goal.w &&
this.y>goal.y && this.y<goal.y+goal.h){
win()
}

}

draw(){

ctx.fillStyle="red"
ctx.fillRect(this.x-cameraX,this.y,this.w,this.h)

}

}

class Platform{
constructor(x,y,w,h){
this.x=x
this.y=y
this.w=w
this.h=h
}

draw(){
ctx.fillStyle="#654321"
ctx.fillRect(this.x-cameraX,this.y,this.w,this.h)
}
}

class Spring{
constructor(x,y){
this.x=x
this.y=y
this.w=30
this.h=20
}

draw(){
ctx.fillStyle="yellow"
ctx.fillRect(this.x-cameraX,this.y,this.w,this.h)
}
}

class MovingWall{
constructor(x,y){
this.x=x
this.y=y
this.w=60
this.h=200
this.dir=1
}

update(){

this.y+=this.dir*2

if(this.y<100) this.dir=1
if(this.y>400) this.dir=-1

}

draw(){
ctx.fillStyle="gray"
ctx.fillRect(this.x-cameraX,this.y,this.w,this.h)
}
}

class Goal{

constructor(x,y){
this.x=x
this.y=y
this.w=60
this.h=60
}

draw(){

ctx.fillStyle="gold"

ctx.beginPath()
ctx.moveTo(this.x-cameraX,this.y+60)
ctx.lineTo(this.x+10-cameraX,this.y)
ctx.lineTo(this.x+30-cameraX,this.y+30)
ctx.lineTo(this.x+50-cameraX,this.y)
ctx.lineTo(this.x+60-cameraX,this.y+60)
ctx.closePath()
ctx.fill()

}

}

let player=new Player()

let platforms=[]
let springs=[]
let movingWalls=[]

let cameraX=0

function generateStage(){

let groundY=450

// 地面
for(let i=0;i<200;i++){

// 落とし穴
if(i%3==0) continue

platforms.push(new Platform(i*200,groundY,200,50))

}

// 足場
let x=200
let y=350

platforms.push(new Platform(200,350,120,20))

for(let i=0;i<40;i++){

x+=250

y+=Math.random()*120-60

if(y<200) y=200
if(y>400) y=400

platforms.push(new Platform(x,y,120,20))

let r=Math.random()

if(r<0.3){
springs.push(new Spring(x+40,y-20))
}

if(r>0.7){
movingWalls.push(new MovingWall(x+60,y-200))
}

}

goal=new Goal(x+300,y-100)

}

generateStage()

function die(){

gameOver=true

document.getElementById("message").innerHTML=
"GAME OVER<br><button onclick='retry()'>Retry</button>"

}

function win(){

clear=true

let time=(Date.now()-startTime)/1000

document.getElementById("message").innerHTML=
"CLEAR!<br>Time:"+time.toFixed(2)+"s<br><button onclick='retry()'>Retry</button>"

}

function retry(){
location.reload()
}

function update(){

cameraX=player.x-200

player.update()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

platforms.forEach(p=>p.draw())
springs.forEach(s=>s.draw())
movingWalls.forEach(m=>m.draw())

goal.draw()

player.draw()

let time=(Date.now()-startTime)/1000
document.getElementById("time").textContent=time.toFixed(1)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>
</body>
</html>
