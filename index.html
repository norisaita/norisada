<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Improved Wall Game</title>
<style>
body { margin:0; overflow:hidden; background:skyblue; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 1000;
canvas.height = 500;

const GRAVITY = 0.6;
const GROUND_Y = 420;

let cameraX = 0;
let startTime = Date.now();
let gameOver = false;
let gameClear = false;

let player = {
  x:100,
  y:300,
  size:30,
  vx:0,
  vy:0,
  speed:5,
  jumpPower:-12,
  onGround:false,
  onWall:false
};

const COURSE_LENGTH = player.size * 120;

let platforms = [
  {x:600,y:300,w:120,h:20},
  {x:1200,y:320,w:150,h:20},
  {x:2000,y:300,w:150,h:20},
  {x:2600,y:320,w:150,h:20}
];

// 🔥 長い壁（地面近くまで）
let walls = [
  {x:800,y:150,w:40,h:270},
  {x:1500,y:100,w:40,h:320},
  {x:2300,y:130,w:40,h:290}
];

let pits = [
  {x:500,w:120},
  {x:1100,w:150},
  {x:1800,w:150},
  {x:2500,w:150}
];

let goal = { x: COURSE_LENGTH, y: 350, size: 40 };

let keys = {};
document.addEventListener("keydown", e => keys[e.code]=true);
document.addEventListener("keyup", e => keys[e.code]=false);

function rectCollision(a,b){
  return a.x < b.x + b.w &&
         a.x + a.size > b.x &&
         a.y < b.y + b.h &&
         a.y + a.size > b.y;
}

function update(){
if(gameOver || gameClear) return;

let prevX = player.x;
let prevY = player.y;

player.vx = 0;
if(keys["ArrowLeft"]) player.vx = -player.speed;
if(keys["ArrowRight"]) player.vx = player.speed;

if(keys["ArrowUp"] && player.onGround){
  player.vy = player.jumpPower;
  player.onGround=false;
}

player.vy += GRAVITY;

player.x += player.vx;
player.y += player.vy;

player.onGround=false;
player.onWall=false;

// ---- 地面（落とし穴判定） ----
let inPit=false;
for(let pit of pits){
  if(player.x+player.size>pit.x &&
     player.x<pit.x+pit.w){
     inPit=true;
  }
}

if(!inPit && player.y+player.size>=GROUND_Y){
  player.y=GROUND_Y-player.size;
  player.vy=0;
  player.onGround=true;
}

// ---- 壁 完全ブロック ----
for(let w of walls){
  if(rectCollision(player,w)){
    if(prevX + player.size <= w.x){
      player.x = w.x - player.size;
      player.onWall=true;
    }
    else if(prevX >= w.x + w.w){
      player.x = w.x + w.w;
      player.onWall=true;
    }
  }
}

// ---- 壁登り ----
if(player.onWall && keys["Space"]){
  player.vy = -4;
}

// ---- 足場 ----
for(let p of platforms){
  if(player.x+player.size>p.x &&
     player.x<p.x+p.w &&
     prevY+player.size<=p.y &&
     player.y+player.size>=p.y){
     player.y=p.y-player.size;
     player.vy=0;
     player.onGround=true;
  }
}

// ---- 落下死亡 ----
if(player.y>canvas.height){
  gameOver=true;
}

// ---- ゴール ----
if(player.x+player.size>goal.x &&
   player.x<goal.x+goal.size &&
   player.y+player.size>goal.y){
   gameClear=true;
}

cameraX = player.x - 200;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.save();
ctx.translate(-cameraX,0);

// 地面
ctx.fillStyle="green";
for(let x=0;x<COURSE_LENGTH+500;x+=100){
  let hole=false;
  for(let pit of pits){
    if(x>=pit.x && x<pit.x+pit.w) hole=true;
  }
  if(!hole){
    ctx.fillRect(x,GROUND_Y,100,canvas.height-GROUND_Y);
  }
}

// 足場
ctx.fillStyle="brown";
for(let p of platforms){
  ctx.fillRect(p.x,p.y,p.w,p.h);
}

// 壁
ctx.fillStyle="gray";
for(let w of walls){
  ctx.fillRect(w.x,w.y,w.w,w.h);
}

// 王冠
ctx.fillStyle="gold";
ctx.fillRect(goal.x,goal.y,goal.size,goal.size);

// プレイヤー
ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.restore();

// UI
ctx.fillStyle="black";
ctx.font="20px Arial";
let time=((Date.now()-startTime)/1000).toFixed(2);
ctx.fillText("Time: "+time+"s",20,30);

if(gameOver){
  ctx.fillStyle="red";
  ctx.font="50px Arial";
  ctx.fillText("GAME OVER",350,250);
}
if(gameClear){
  ctx.fillStyle="blue";
  ctx.font="50px Arial";
  ctx.fillText("CLEAR!",380,200);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
