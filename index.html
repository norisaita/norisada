<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Action Game</title>
<style>
body{margin:0;overflow:hidden;background:skyblue;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=1000;
canvas.height=500;

const GRAVITY=0.6;
const GROUND_Y=420;
const PLAYER_SIZE=30;
const COURSE_LENGTH=PLAYER_SIZE*150;

let cameraX=0;
let startTime;
let gameState="playing"; // playing / over / clear

let player;
let keys={};

function init(){
player={
x:100,
y:300,
size:PLAYER_SIZE,
vx:0,
vy:0,
speed:5,
jumpPower:-12,
onGround:false,
onWall:false
};
cameraX=0;
startTime=Date.now();
gameState="playing";
}

init();

document.addEventListener("keydown",e=>{
keys[e.code]=true;

if(gameState!=="playing" && e.code==="KeyR"){
init();
}
});

document.addEventListener("keyup",e=>{
keys[e.code]=false;
});

function rectCollision(a,b){
return a.x<b.x+b.w &&
a.x+a.size>b.x &&
a.y<b.y+b.h &&
a.y+a.size>b.y;
}

// 固定壁
let walls=[
{x:900,y:150,w:40,h:270},
{x:2000,y:100,w:40,h:320}
];

// 🔥 上下に動く壁
let movingWalls=[
{x:1400,y:200,w:40,h:200,minY:100,maxY:300,dir:1,speed:2}
];

let platforms=[
{x:600,y:300,w:120,h:20},
{x:1600,y:250,w:200,h:20},
{x:2300,y:280,w:200,h:20}
];

let pits=[
{x:500,w:120},
{x:1100,w:150},
{x:1800,w:150},
{x:2600,w:200}
];

let goal={x:COURSE_LENGTH,y:350,size:40};

function update(){

if(gameState!=="playing") return;

// 動く壁の更新
for(let w of movingWalls){
w.y+=w.speed*w.dir;
if(w.y<w.minY || w.y>w.maxY){
w.dir*=-1;
}
}

let prevX=player.x;
let prevY=player.y;

player.vx=0;
if(keys["ArrowLeft"]) player.vx=-player.speed;
if(keys["ArrowRight"]) player.vx=player.speed;

if(keys["ArrowUp"] && player.onGround){
player.vy=player.jumpPower;
player.onGround=false;
}

player.vy+=GRAVITY;
player.x+=player.vx;
player.y+=player.vy;

player.onGround=false;
player.onWall=false;

// ---- 地面＋落とし穴 ----
let inPit=false;
for(let pit of pits){
if(player.x+player.size>pit.x &&
player.x<pit.x+pit.w){
inPit=true;
}
}

if(!inPit && player.y+player.size>=GROUND_Y){
player.y=GROUND_Y-player.size;
player.vy=0;
player.onGround=true;
}

// ---- 足場 ----
for(let p of platforms){
if(player.x+player.size>p.x &&
player.x<p.x+p.w &&
prevY+player.size<=p.y &&
player.y+player.size>=p.y){
player.y=p.y-player.size;
player.vy=0;
player.onGround=true;
}
}

// ---- 壁（固定＋動く） ----
let allWalls=[...walls,...movingWalls];

for(let w of allWalls){
if(rectCollision(player,w)){
if(prevX+player.size<=w.x){
player.x=w.x-player.size;
player.onWall=true;
}
else if(prevX>=w.x+w.w){
player.x=w.x+w.w;
player.onWall=true;
}
}
}

// ---- 壁登り ----
if(player.onWall && keys["Space"]){
player.vy=-4;
}

// ---- 落下死亡 ----
if(player.y>canvas.height){
gameState="over";
}

// ---- ゴール ----
if(player.x+player.size>goal.x &&
player.x<goal.x+goal.size &&
player.y+player.size>goal.y){
gameState="clear";
}

cameraX=player.x-200;
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.save();
ctx.translate(-cameraX,0);

// 地面
ctx.fillStyle="green";
for(let x=0;x<COURSE_LENGTH+500;x+=100){
let hole=false;
for(let pit of pits){
if(x>=pit.x && x<pit.x+pit.w) hole=true;
}
if(!hole){
ctx.fillRect(x,GROUND_Y,100,canvas.height-GROUND_Y);
}
}

// 足場
ctx.fillStyle="brown";
for(let p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h);
}

// 壁
ctx.fillStyle="gray";
for(let w of walls){
ctx.fillRect(w.x,w.y,w.w,w.h);
}

// 動く壁
ctx.fillStyle="darkgray";
for(let w of movingWalls){
ctx.fillRect(w.x,w.y,w.w,w.h);
}

// 王冠
ctx.fillStyle="gold";
ctx.fillRect(goal.x,goal.y,goal.size,goal.size);

// プレイヤー
ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.restore();

// UI
ctx.fillStyle="black";
ctx.font="20px Arial";
let time=((Date.now()-startTime)/1000).toFixed(2);
ctx.fillText("Time: "+time+"s",20,30);

if(gameState==="over"){
ctx.fillStyle="red";
ctx.font="50px Arial";
ctx.fillText("GAME OVER",350,220);
ctx.font="20px Arial";
ctx.fillText("Press R to Retry",420,260);
}

if(gameState==="clear"){
ctx.fillStyle="blue";
ctx.font="50px Arial";
ctx.fillText("CLEAR!",380,200);
ctx.font="25px Arial";
ctx.fillText("Time: "+time+"s",420,240);
ctx.fillText("Press R to Retry",400,280);
}
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
